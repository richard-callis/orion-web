# Redis Sentinel 1 Configuration
# Port: 26379
port 26379
bind 0.0.0.0

# Monitor the master Redis instance
# Format: sentinel monitor <master-name> <master-ip> <master-port> <quorum>
# Quorum: minimum number of sentinels that must agree to promote a slave
sentinel monitor mymaster redis-master 6379 2

# Master authentication (if required)
# sentinel auth-pass mymaster <redis-password>

# Failover timeout (ms): max time to wait for a failover to complete
sentinel failover-timeout mymaster 30000

# Parallel sync slaves count (number of replicas to reconfigure in parallel during failover)
sentinel parallel-syncs mymaster 1

# Data directory
dir /data

# Log file
logfile ""

# Run in background
daemonize no
