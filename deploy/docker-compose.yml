services:

  # ── ORION ────────────────────────────────────────────────────────
  orion:
    image: ghcr.io/${GITHUB_ORG}/orion-web:${ORION_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://orion:${POSTGRES_PASSWORD}@postgres:5432/orion
      NEXTAUTH_URL: https://${ORION_DOMAIN:-orion.khalis.corp}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      # Git provider — configured via first-run wizard (stored in DB).
      # These env vars are used as fallback before the wizard completes.
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_TOKEN: ${GITEA_ADMIN_TOKEN:-}
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-}
      MANAGEMENT_IP: ${MANAGEMENT_IP:-}
      COREDNS_DIR: /etc/coredns-managed
      LOCALHOST_JOIN_TOKEN: ${LOCALHOST_JOIN_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - orion-claude-creds:/claude-creds
      - ./coredns:/etc/coredns-managed
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.orion.rule: "Host(`${ORION_DOMAIN:-orion.khalis.corp}`)"
      traefik.http.routers.orion.entrypoints: "websecure"
      traefik.http.services.orion.loadbalancer.server.port: "3000"

  # ── Local Gateway ─────────────────────────────────────────────────────────────
  gateway:
    image: ghcr.io/${GITHUB_ORG}/orion-gateway:${ORION_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      orion:
        condition: service_healthy
    environment:
      ORION_URL: http://orion:3000
      JOIN_TOKEN: ${LOCALHOST_JOIN_TOKEN}
      GATEWAY_TYPE: localhost
      GATEWAY_URL: http://gateway:3001
      GATEWAY_CREDS_FILE: /gateway-creds/credentials.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - gateway-creds:/gateway-creds

  # ── Gitea (optional — activate with: docker compose --profile gitea up) ────
  # Only needed when using the bundled Gitea git provider.
  # If connecting to GitHub, GitLab, or an external Gitea, leave this profile inactive.
  gitea:
    profiles: [gitea]
    image: gitea/gitea:latest
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-gitea.internal}
      GITEA__server__ROOT_URL: https://${GITEA_DOMAIN:-gitea.internal}
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN:-gitea.internal}
      GITEA__server__SSH_PORT: 2222
      GITEA__webhook__ALLOWED_HOST_LIST: orion
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__admin__DISABLE_REGULAR_ORG_CREATION: "false"
    volumes:
      - gitea-data:/data
    ports:
      - "2222:22"
    labels:
      traefik.enable: "true"
      traefik.http.routers.gitea.rule: "Host(`${GITEA_DOMAIN:-gitea.internal}`)"
      traefik.http.routers.gitea.entrypoints: "websecure"
      traefik.http.services.gitea.loadbalancer.server.port: "3000"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vault init — fixes data dir ownership for vault user (uid=100) ────────────
  vault-init:
    image: alpine
    restart: "no"
    command: ["sh", "-c", "chown -R 100:1000 /vault/data && echo 'vault data dir ready'"]
    volumes:
      - vault-data:/vault/data

  # ── Vault ──────────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:latest
    restart: unless-stopped
    # Override the default "server -dev" CMD — use production mode with config only
    command: server
    depends_on:
      vault-init:
        condition: service_completed_successfully
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: |
        ui = true
        disable_mlock = true
        storage "raft" {
          path = "/vault/data"
          node_id = "mgmt-rpi"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        api_addr = "http://vault:8200"
        cluster_addr = "http://vault:8201"
    volumes:
      - vault-data:/vault/data
    healthcheck:
      # exit 0 = active, exit 1 = uninitialized, exit 2 = sealed — all mean vault is running
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200; [ $? -le 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vault.rule: "Host(`${VAULT_DOMAIN:-vault.khalis.corp}`)"
      traefik.http.routers.vault.entrypoints: "websecure"
      traefik.http.services.vault.loadbalancer.server.port: "8200"

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--providers.file.directory=/traefik/dynamic"
      - "--providers.file.watch=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/traefik/certs
      - ./traefik/dynamic:/traefik/dynamic:ro
    ports:
      - "80:80"
      - "443:443"

  # ── Claude Creds Refresh ───────────────────────────────────────────────────
  claude-refresh:
    build:
      context: ./claude-refresh
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - orion-claude-creds:/claude-creds
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # ── CoreDNS ────────────────────────────────────────────────────────────────
  coredns:
    image: coredns/coredns:latest
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./coredns:/etc/coredns:ro
    ports:
      - "53:53/udp"
      - "53:53/tcp"

volumes:
  gitea-data:
  postgres-data:
  vault-data:
  traefik-certs:
  orion-claude-creds:
  gateway-creds:
