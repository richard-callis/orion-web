services:

  # ── ORION ────────────────────────────────────────────────────────
  orion:
    image: ghcr.io/${GITHUB_ORG}/orion-web:${ORION_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
      minio:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://orion:${POSTGRES_PASSWORD}@postgres:5432/orion
      NEXTAUTH_URL: https://${ORION_DOMAIN:-orion.khalis.corp}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ORION_ENCRYPTION_KEY: ${ORION_ENCRYPTION_KEY}
      ORION_UNSEALER_TOKEN: ${ORION_UNSEALER_TOKEN}
      VAULT_ADDR: https://vault-proxy:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_CACERT: /vault-proxy-certs/ca.crt
      VAULT_CLIENT_CERT: /vault-proxy-certs/orion-client.crt
      VAULT_CLIENT_KEY: /vault-proxy-certs/orion-client.key
      # Git provider — configured via first-run wizard (stored in DB).
      # These env vars are used as fallback before the wizard completes.
      GITEA_URL: http://gitea:3000
      GITEA_PUBLIC_URL: https://${GITEA_DOMAIN:-gitea.khalisio.com}
      GITEA_ADMIN_TOKEN: ${GITEA_ADMIN_TOKEN:-}
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-}
      MANAGEMENT_IP: ${MANAGEMENT_IP:-}
      # URL gateways/clusters use to reach ORION (bypasses Cloudflare, works from cluster nodes).
      # Defaults to http://<management IP>:3000 during initial setup.
      # Override in .env with your public domain once HTTPS is configured.
      ORION_CALLBACK_URL: ${ORION_CALLBACK_URL:-http://${MANAGEMENT_IP:-localhost}:3000}
      COREDNS_DIR: /etc/coredns-managed
      LOCALHOST_JOIN_TOKEN: ${LOCALHOST_JOIN_TOKEN}
      EMBED_TRIGGER_TOKEN: ${EMBED_TRIGGER_TOKEN:-}
      # Service token for gateway↔ORION authentication (SOC2: [AC-001])
      ORION_GATEWAY_TOKEN: ${ORION_GATEWAY_TOKEN:-}
      # Shared secret for gateway-to-web security audit channel (PR4)
      GATEWAY_AUDIT_SECRET: ${GATEWAY_AUDIT_SECRET:-}
      # Audit Log Archival (S3 Export) — SOC2 [L-001]
      AUDIT_EXPORT_S3_BACKEND: ${AUDIT_EXPORT_S3_BACKEND:-minio}
      AUDIT_EXPORT_S3_ENDPOINT: ${AUDIT_EXPORT_S3_ENDPOINT:-http://minio:9000}
      AUDIT_EXPORT_S3_REGION: ${AUDIT_EXPORT_S3_REGION:-us-east-1}
      AUDIT_EXPORT_S3_BUCKET: ${AUDIT_EXPORT_S3_BUCKET:-orion-audit-logs}
      AUDIT_EXPORT_RETENTION_DAYS: ${AUDIT_EXPORT_RETENTION_DAYS:-30}
      AUDIT_EXPORT_MANIFEST_PATH: ${AUDIT_EXPORT_MANIFEST_PATH:-manifests/}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      # Redis Sentinel for distributed rate limiting (SOC2: [RATE-001])
      REDIS_SENTINEL_MASTER: ${REDIS_SENTINEL_MASTER:-mymaster}
      REDIS_SENTINEL_NODES: ${REDIS_SENTINEL_NODES:-redis-sentinel-1:26379,redis-sentinel-2:26380,redis-sentinel-3:26381}
      REDIS_SENTINEL_PASSWORD: ${REDIS_SENTINEL_PASSWORD:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # ArgoCD — bootstrap uses this to register clusters and create apps
      ARGOCD_SERVER: http://host.docker.internal:8083
      ARGOCD_AUTH_TOKEN: ${ARGOCD_ADMIN_PASSWORD:-}
      # Claude Code sidecar URL (for OAuth bootstrap and credential status)
      ORION_CLAUDE_URL: ${ORION_CLAUDE_URL:-http://orion-claude:3100}
      # MCP service token — shared with orion-claude so Claude can call ORION tools via MCP
      ORION_MCP_TOKEN: ${ORION_MCP_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - orion-claude-creds:/claude-creds
      - ./coredns:/etc/coredns-managed
      - /root/.ssh:/root/.ssh:ro
      - /root/.kube:/root/.kube:ro
      - /root/.talos:/root/.talos:ro
      - ./vault-proxy/certs:/vault-proxy-certs:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.orion.rule: "Host(`${ORION_DOMAIN:-orion.khalis.corp}`)"
      traefik.http.routers.orion.entrypoints: "websecure"
      traefik.http.services.orion.loadbalancer.server.port: "3000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  # ── Local Gateway ─────────────────────────────────────────────────────────────
  gateway:
    image: ghcr.io/${GITHUB_ORG}/orion-gateway:${ORION_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      orion:
        condition: service_healthy
    environment:
      ORION_URL: http://orion:3000
      JOIN_TOKEN: ${LOCALHOST_JOIN_TOKEN}
      GATEWAY_TYPE: localhost
      GATEWAY_URL: http://gateway:3001
      GATEWAY_CREDS_FILE: /gateway-creds/credentials.json
      # Token to authenticate with ORION's API (e.g. for knowledge graph tools)
      ORION_GATEWAY_TOKEN: ${ORION_GATEWAY_TOKEN:-}
      # Shared secret for gateway-to-web security audit channel (PR4)
      GATEWAY_AUDIT_SECRET: ${GATEWAY_AUDIT_SECRET:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - gateway-creds:/gateway-creds
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ── Gitea (optional — activate with: docker compose --profile gitea up) ────
  # Only needed when using the bundled Gitea git provider.
  # If connecting to GitHub, GitLab, or an external Gitea, leave this profile inactive.
  gitea:
    profiles: [gitea]
    image: gitea/gitea:latest
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-gitea.khalisio.com}
      GITEA__server__ROOT_URL: https://${GITEA_DOMAIN:-gitea.khalisio.com}
      GITEA__server__LOCAL_ROOT_URL: http://gitea:3000
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN:-gitea.khalisio.com}
      GITEA__server__SSH_PORT: 2222
      GITEA__webhook__ALLOWED_HOST_LIST: orion,10.2.2.0/24,127.0.0.1,localhost
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__admin__DISABLE_REGULAR_ORG_CREATION: "false"
      GITEA__actions__ENABLED: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: "false"
    volumes:
      - gitea-data:/data
    ports:
      - "2222:22"
      - "3002:3000"
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # ── ArgoCD (GitOps — runs on host, manages the Talos Cluster externally) ─
  argocd-server:
    image: quay.io/argoproj/argocd:latest
    restart: unless-stopped
    depends_on:
      - argocd-redis
    ports:
      - "8083:8080"
    environment:
      - ARGOCD_SERVER_INSECURE=true
      - ARGOCD_SERVER_INSECURE_HTTP_BASIC_ENABLE=true
    volumes:
      - argocd-server-data:/home/argocd
      - ${HOME}/.kube:/kubeconfig:ro
    command:
      - argocd-server
      - --insecure
      - --static-assets
      - /shared/app

  argocd-repo-server:
    image: quay.io/argoproj/argocd:latest
    restart: unless-stopped
    depends_on:
      - argocd-redis
    volumes:
      - argocd-server-data:/shared
      - ${HOME}/.kube:/kubeconfig:ro
    command:
      - argocd-repo-server
      - /shared/repositories
      - /shared/generate
      - /shared/umask
      - /tmp/argocd

  argocd-application-controller:
    image: quay.io/argoproj/argocd:latest
    restart: unless-stopped
    depends_on:
      - argocd-redis
    volumes:
      - argocd-server-data:/shared
      - ${HOME}/.kube:/kubeconfig:ro
    command:
      - argocd-application-controller
      - --status-process-limit 1
      - --local

  argocd-redis:
    image: docker.io/library/redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - argocd-redis-data:/data

# ── PostgreSQL
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  # ── Vault init — fixes data dir ownership for vault user (uid=100) ────────────
  vault-init:
    image: alpine
    restart: "no"
    command: ["sh", "-c", "chown -R 100:1000 /vault/data && mkdir -p /vault/audit && chown -R 100:1000 /vault/audit && echo 'vault data dir ready'"]
    volumes:
      - vault-data:/vault/data
      - vault-audit:/vault/audit

  # ── Vault ──────────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    command: server
    depends_on:
      vault-init:
        condition: service_completed_successfully
    cap_add:
      - IPC_LOCK
    environment:
      SKIP_SETCAP: "true"
      SKIP_CHOWN: "true"
      VAULT_LOCAL_CONFIG: |
        ui = true
        disable_mlock = true
        storage "raft" {
          path = "/vault/data"
          node_id = "mgmt-node"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        api_addr = "http://vault:8200"
        cluster_addr = "http://vault:8201"
    volumes:
      - vault-data:/vault/data
      - vault-audit:/vault/audit
      - ./vault-proxy/certs:/vault-proxy-certs:ro
    healthcheck:
      # exit 0 = active, exit 1 = uninitialized, exit 2 = sealed — all mean vault is running
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200; [ $? -le 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vault.rule: "Host(`${VAULT_DOMAIN:-vault.khalis.corp}`)"
      traefik.http.routers.vault.entrypoints: "websecure"
      traefik.http.services.vault.loadbalancer.server.port: "8200"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ── Vault proxy (Envoy) ───────────────────────────────────────────────────
  # Sole external entry point for Vault. Vault itself exposes no host port.
  # Provides: mTLS termination, IP allowlisting, rate limiting, circuit breaking,
  # per-connection access logs, and Prometheus metrics on :9901.
  vault-proxy:
    image: envoyproxy/envoy:v1.29-latest
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    ports:
      - "${MANAGEMENT_IP:-10.2.2.9}:8200:8200"
      - "127.0.0.1:9901:9901"
    volumes:
      - ./vault-proxy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./vault-proxy/certs:/certs:ro
    # Wait for ORION wizard to generate certs before starting Envoy
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "vault-proxy: waiting for TLS certs from ORION..."
        until [ -f /certs/tls.crt ] && [ -f /certs/ca.crt ]; do sleep 3; done
        echo "vault-proxy: certs ready, starting Envoy"
        exec /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qo- http://localhost:9901/ready 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ── Vault Unsealer Sidecar ─────────────────────────────────────────────────
  # Fetches unseal keys from ORION's internal API on startup.
  # Keys live in process memory only — never written to disk.
  # For existing installs: set VAULT_UNSEAL_KEY_1/2/3 in .env once to trigger
  # auto-migration to the encrypted DB store, then remove them.
  vault-unsealer:
    build:
      context: ./vault-unsealer
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      orion:
        condition: service_healthy
    read_only: true
    environment:
      ORION_URL: http://orion:3000
      VAULT_URL: http://vault:8200
      ORION_UNSEALER_TOKEN: ${ORION_UNSEALER_TOKEN}
      UNSEAL_POLL_INTERVAL: "30"
      # Migration only — set these once for existing installs, remove after first run
      VAULT_UNSEAL_KEY_1: ${VAULT_UNSEAL_KEY_1:-}
      VAULT_UNSEAL_KEY_2: ${VAULT_UNSEAL_KEY_2:-}
      VAULT_UNSEAL_KEY_3: ${VAULT_UNSEAL_KEY_3:-}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Claude Code Service ────────────────────────────────────────────────────
  # Persistent Claude Code sidecar. Handles OAuth login interactively and
  # stores credentials in the shared orion-claude-creds volume.
  # ORION web reads credentials from /claude-creds (same volume).
  orion-claude:
    build:
      context: ./orion-claude
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - orion-claude-creds:/root/.claude   # native claude credentials directory
    environment:
      PORT: 3100
      CLAUDE_HOME: /root/.claude
      ORION_URL: http://orion:3000
      ORION_MCP_TOKEN: ${ORION_MCP_TOKEN:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ── Claude Creds Refresh ───────────────────────────────────────────────────
  claude-refresh:
    build:
      context: ./claude-refresh
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - orion-claude-creds:/claude-creds
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ── CoreDNS ────────────────────────────────────────────────────────────────
  coredns:
    image: coredns/coredns:latest
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./coredns:/etc/coredns:ro
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── MinIO (S3-compatible object storage for audit log archival — SOC2 [L-001]) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ── MinIO init container — creates orion-audit-logs bucket on startup ────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/orion-audit-logs --ignore-existing;
      /usr/bin/mc version enable myminio/orion-audit-logs;
      echo 'MinIO bucket orion-audit-logs initialized with versioning';
      "

  # ── Redis Sentinel cluster (3 sentinels for HA + distributed rate limiting) ──
  # Master node (port 6379)
  redis-master:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --dir /data
    volumes:
      - redis-master-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── Redis Sentinel 1 (port 26379) ──────────────────────────────────────────
  redis-sentinel-1:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    entrypoint: /entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/entrypoint.sh:ro
      - ./redis-sentinel-1.conf:/etc/redis-sentinel.conf:ro
      - redis-sentinel-1-data:/data
    ports:
      - "26379:26379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "sentinel", "masters"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Redis Sentinel 2 (port 26380) ──────────────────────────────────────────
  redis-sentinel-2:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    entrypoint: /entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/entrypoint.sh:ro
      - ./redis-sentinel-2.conf:/etc/redis-sentinel.conf:ro
      - redis-sentinel-2-data:/data
    ports:
      - "26380:26380"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26380", "sentinel", "masters"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Redis Sentinel 3 (port 26381) ──────────────────────────────────────────
  redis-sentinel-3:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    entrypoint: /entrypoint.sh
    volumes:
      - ./sentinel-entrypoint.sh:/entrypoint.sh:ro
      - ./redis-sentinel-3.conf:/etc/redis-sentinel.conf:ro
      - redis-sentinel-3-data:/data
    ports:
      - "26381:26381"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26381", "sentinel", "masters"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Vector — host telemetry shipper ───────────────────────────────────────
  # Collects journald, Docker lifecycle, Vault audit, and edge container logs
  # from the Orion host, batches them, and POSTs to the host-agent webhook.
  #
  # This is the shipper described in gigly-sniffing-parasol.md (PR2).
  vector:
    # Custom image: timberio/vector:0.39.0-debian + docker CLI (no daemon).
    # The docker_lifecycle source `exec`s `docker events`; stock image has no
    # docker binary. See deploy/host-agent/Dockerfile.
    image: ghcr.io/${GITHUB_ORG}/orion-vector:${ORION_VERSION:-latest}
    # The image's default config path is /etc/vector/vector.yaml, which exists
    # in the image as a demo-logs generator. Without --config, vector loads
    # that demo and ships fake events. Point it explicitly at the mounted TOML.
    command: ["--config", "/etc/vector/vector.toml"]
    restart: unless-stopped
    depends_on:
      orion:
        condition: service_healthy
    read_only: true
    user: "1000:1000"
    group_add:
      - "${DOCKER_GID:-999}"
    environment:
      HOST_AGENT_WEBHOOK_SECRET: "${HOST_AGENT_WEBHOOK_SECRET:-}"
      ORION_HOST_AGENT_WEBHOOK_URL: "http://orion:3000/api/monitoring/security/webhooks/host-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - vault-audit:/vault/audit:ro
      - ./host-agent/vector.toml:/etc/vector/vector.toml:ro
      - vector-data:/var/lib/vector
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  gitea-data:
  postgres-data:
  vault-data:
  orion-claude-creds:
  gateway-creds:
  minio-data:
  redis-master-data:
  redis-sentinel-1-data:
  redis-sentinel-2-data:
  redis-sentinel-3-data:
  argocd-server-data:
  argocd-redis-data:
  vector-data:
  vault-audit:
