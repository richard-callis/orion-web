services:

  # ── Mission Control ────────────────────────────────────────────────────────
  mcc:
    image: ghcr.io/${GITHUB_ORG}/mcc-web:${MCC_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mcc:${POSTGRES_PASSWORD}@postgres:5432/mcc
      NEXTAUTH_URL: https://${MCC_DOMAIN:-mcc.khalis.corp}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_TOKEN: ${GITEA_ADMIN_TOKEN}
      MCC_FIRST_RUN: ${MCC_FIRST_RUN:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - mcc-claude-creds:/claude-creds
    ports:
      - "3000:3000"
    labels:
      traefik.enable: "true"
      traefik.http.routers.mcc.rule: "Host(`${MCC_DOMAIN:-mcc.khalis.corp}`)"
      traefik.http.routers.mcc.entrypoints: "websecure"
      traefik.http.services.mcc.loadbalancer.server.port: "3000"

  # ── Gitea ──────────────────────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:latest
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-gitea.khalis.corp}
      GITEA__server__ROOT_URL: https://${GITEA_DOMAIN:-gitea.khalis.corp}
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN:-gitea.khalis.corp}
      GITEA__server__SSH_PORT: 2222
      GITEA__webhook__ALLOWED_HOST_LIST: mcc
    volumes:
      - gitea-data:/data
    ports:
      - "2222:22"
    labels:
      traefik.enable: "true"
      traefik.http.routers.gitea.rule: "Host(`${GITEA_DOMAIN:-gitea.khalis.corp}`)"
      traefik.http.routers.gitea.entrypoints: "websecure"
      traefik.http.services.gitea.loadbalancer.server.port: "3000"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcc
      POSTGRES_USER: mcc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vault ──────────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:latest
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: |
        ui = true
        storage "raft" {
          path = "/vault/data"
          node_id = "mgmt-rpi"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        api_addr = "http://vault:8200"
        cluster_addr = "http://vault:8201"
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vault.rule: "Host(`${VAULT_DOMAIN:-vault.khalis.corp}`)"
      traefik.http.routers.vault.entrypoints: "websecure"
      traefik.http.services.vault.loadbalancer.server.port: "8200"

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--providers.file.directory=/traefik/dynamic"
      - "--providers.file.watch=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/traefik/certs
      - ./traefik/dynamic:/traefik/dynamic:ro
    ports:
      - "80:80"
      - "443:443"

  # ── CoreDNS ────────────────────────────────────────────────────────────────
  coredns:
    image: coredns/coredns:latest
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./coredns:/etc/coredns:ro
      - coredns-zones:/etc/coredns/zones
    ports:
      - "53:53/udp"
      - "53:53/tcp"

volumes:
  gitea-data:
  postgres-data:
  vault-data:
  traefik-certs:
  coredns-zones:
  mcc-claude-creds:
