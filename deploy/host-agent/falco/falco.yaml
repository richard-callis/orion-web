# Falco configuration for the Orion host.
#
# This is the minimal config — uses Falco's built-in rule set
# (/etc/falco/falco_rules.yaml inside the container, shipped with the image).
# Custom rules tuned to Orion workloads (e.g., alert if gateway reads
# /root/.kube) are out of scope for Phase 2.
#
# Output: Falco POSTs JSON to Falcosidekick on port 2801 (http_output).
# Falcosidekick then forwards to the Orion webhook with retries and
# CUSTOMFIELDS injection. gRPC output is disabled — Falcosidekick 2.x
# in its default mode receives HTTP POSTs from Falco, not gRPC streams.

# ── Rule files ──────────────────────────────────────────────────────────────
rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml

# ── Engine / driver ─────────────────────────────────────────────────────────
# modern_ebpf (CO-RE) — no probe file needed; BTF is available on this host
# at /sys/kernel/btf/vmlinux (kernel 6.8.0-124-generic, PREEMPT_DYNAMIC).
# The falco:0.38.x image's entrypoint runs `falcoctl driver install` which
# defaults to modern_ebpf; aligning this config removes the mismatch that
# caused the crash-loop ("need to provide a path to the bpf object file").
# Previous note about modern_ebpf segfaulting was on an earlier 6.8 build;
# verified BTF present before switching.
engine:
  kind: modern_ebpf

# ── Output channels ─────────────────────────────────────────────────────────
# http_output: Falco POSTs each alert to Falcosidekick which handles retries,
# CUSTOMFIELDS injection, and forwarding to the Orion webhook.
http_output:
  enabled: true
  url: http://falcosidekick:2801
  user_agent: falcosecurity/falco

stdout_output:
  enabled: true

# Disable outputs we don't use.
grpc:
  enabled: false

grpc_output:
  enabled: false

file_output:
  enabled: false

syslog_output:
  enabled: false

# ── Other ───────────────────────────────────────────────────────────────────
metrics:
  enabled: false

priority: notice
buffered_outputs: false
output_timeout: 2000

disable_source: []
