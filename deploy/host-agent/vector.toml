# Vector configuration for Orion host-agent telemetry shipper.
#
# Collects four signal categories from the Orion management host:
#   1. journald — SSH, sudo, PAM authentication failures
#   2. Docker Events API — container lifecycle (OOM, die, kill, restart, start)
#   3. Vault audit — unseal, token creation, policy changes
#   4. Docker logs — Traefik access logs, Authentik auth events
#
# Batches events over 5s / 100 events using reduce, builds a
# { batch_id, hostname, events: [...] } envelope, signs with HMAC-SHA256,
# then POSTs JSON to the host-agent webhook on the Orion app server.
#
# Secret management:
#   HOST_AGENT_WEBHOOK_SECRET is generated by bootstrap.sh.
#   It is written to .env and referenced by the vector service via env_file.

# ── Global settings ──────────────────────────────────────────────────────────

data_dir = "/var/lib/vector"

[api]
enabled = true
address = "127.0.0.1:8686"

# ── Source 1: journald (auth events) ─────────────────────────────────────────
# Collects auth-related systemd journal entries.
#
# We filter by _COMM (process name) rather than _SYSTEMD_UNIT because:
#   - PAM-driven auth events (sshd session opens, sudo failures) are written
#     by the bare binary in journald, not attributed to a unit
#   - SSH unit name varies by distro (sshd.service on RHEL, ssh.service on
#     Debian/Ubuntu) — _COMM=sshd is portable
#   - sudo is a binary, not a service — _SYSTEMD_UNIT=sudo never matches

[sources.journald_auth]
type = "journald"

[sources.journald_auth.include_matches]
_COMM = ["sshd", "sudo", "su", "login", "passwd"]

# ── Source 2: Docker Events API (container lifecycle events) ─────────────────
# Streams Docker lifecycle events (oom, die, restart, kill, start) via exec.
# docker_logs does not emit lifecycle events — use exec + docker events.

[sources.docker_lifecycle]
type = "exec"
mode = "streaming"
command = ["docker", "events", "--format", "{{json .}}", "--filter", "event=oom", "--filter", "event=die", "--filter", "event=restart", "--filter", "event=kill", "--filter", "event=start"]

# ── Source 3: Vault audit log file ───────────────────────────────────────────
# Reads the file-based audit log written by Vault's audit device.
# File path: /vault/audit/audit.log (mounted via docker-compose volume share).

[sources.vault_audit]
type = "file"
include = ["/vault/audit/audit.log"]
read_from = "end"
data_dir = "/var/lib/vector"

# ── Source 4: Docker logs (edge containers: traefik + authentik) ─────────────
# Collects stdout/stderr from the edge-proxy containers.

[sources.docker_edge_logs]
type = "docker_logs"
include_containers = ["traefik", "authentik", "authentik-worker"]

# ── Transform 1: journald auth → structured event ───────────────────────────
# Maps journald log lines into the HostAgentEvent shape.

[transforms.journald_to_event]
type = "remap"
inputs = ["journald_auth"]
source = """
  msg = string(.message) ?? ""
  unit = string(._SYSTEMD_UNIT) ?? "journald"
  if contains(msg, "Failed password") || contains(msg, "Failed keyboard") {
    .subtype = "ssh.failed_password"
  } else if contains(msg, "Invalid user") {
    .subtype = "ssh.invalid_user"
  } else if contains(msg, "NOT in sudoers") {
    .subtype = "sudo.failed"
  } else if contains(msg, "sudo:") && contains(msg, "TTY") && !contains(msg, "NOT in sudoers") {
    .subtype = "sudo.success"
  } else if contains(msg, "authentication failure") {
    .subtype = "pam.failure"
  } else {
    .subtype = "auth.generic"
  }
  .category = "auth"
  .severity = 40
  .source_file = unit
  .raw = msg
"""

# ── Transform 2: Docker lifecycle events → structured event ─────────────────
# Parses JSON docker event lines and maps to HostAgentEvent shape.

[transforms.docker_lifecycle_to_event]
type = "remap"
inputs = ["docker_lifecycle"]
source = """
  parsed, err = parse_json(.message)
  if err != null { abort }
  action = string(parsed.Action) ?? "unknown"
  name = string(parsed.Actor.Attributes.name) ?? "unknown"
  if action == "oom" {
    .subtype = "container.oom"
    .severity = 30
  } else if action == "die" {
    .subtype = "container.dead"
    .severity = 40
  } else if action == "restart" {
    .subtype = "container.restarted"
    .severity = 20
  } else if action == "kill" {
    .subtype = "container.dead"
    .severity = 40
  } else {
    .subtype = "container." + action
    .severity = 10
  }
  .category = "docker"
  .source_file = name
  .raw = .message
"""

# ── Transform 3: Vault audit → structured event ─────────────────────────────
# Parses Vault's file audit JSON lines into the HostAgentEvent shape.

[transforms.vault_to_event]
type = "remap"
inputs = ["vault_audit"]
source = """
  parsed, err = parse_json(.message)
  if err != null { abort }
  request = object(parsed.request) ?? {}
  operation = string(request.operation) ?? "unknown"
  path = string(request.path) ?? ""
  if operation == "update" && contains(path, "unseal") {
    .subtype = "vault.unseal"
    .severity = 50
  } else if operation == "update" && path == "sys/token/create" {
    policies = array(request.policies) ?? []
    if includes(policies, "root") {
      .subtype = "vault.token.create.root"
      .severity = 70
    } else {
      .subtype = "vault.token.create"
      .severity = 30
    }
  } else if operation == "revoke" {
    .subtype = "vault.token.revoke"
    .severity = 30
  } else if operation == "update" && contains(path, "policy") {
    .subtype = "vault.policy.change"
    .severity = 50
  } else {
    .subtype = "vault." + operation
    .severity = 20
  }
  .category = "vault"
  .source_file = "/vault/audit/audit.log"
  .raw = .message
"""

# ── Transform 4: Edge Docker logs → structured event ────────────────────────
# Parses Authentik and Traefik log lines.

[transforms.edge_to_event]
type = "remap"
inputs = ["docker_edge_logs"]
source = """
  name = string(.container_name) ?? "edge"
  msg = string(.message) ?? ""
  if contains(name, "authentik") {
    if contains(msg, "denied") || contains(msg, "Forbidden") || contains(msg, "invalid") {
      .subtype = "auth.denied"
      .severity = 30
    } else if contains(msg, "Authenticated successfully") || contains(msg, "login success") {
      .subtype = "auth.success"
      .severity = 10
    } else {
      .subtype = "auth.generic"
      .severity = 0
    }
    .category = "edge"
  } else if contains(name, "traefik") {
    if contains(msg, "403") || contains(msg, "401") || contains(msg, "denied") {
      .subtype = "http.deny"
      .severity = 20
    } else {
      .subtype = "http.access"
      .severity = 0
    }
    .category = "edge"
  } else {
    .category = "edge"
    .subtype = "http.access"
    .severity = 0
  }
  .source_file = name
  .raw = msg
"""

# ── Batching pipeline ─────────────────────────────────────────────────────────
# Step 1: wrap each event into an events array

[transforms.wrap_event]
type = "remap"
inputs = ["journald_to_event", "docker_lifecycle_to_event", "vault_to_event", "edge_to_event"]
source = """
  event = {
    "category": .category,
    "subtype": .subtype,
    "severity": .severity,
    "timestamp": format_timestamp!(timestamp(.timestamp) ?? now(), format: "%+"),
    "source_file": string(.source_file) ?? "unknown",
    "raw": string(.raw) ?? ""
  }
  . = { "events": [event] }
"""

# Step 2: reduce events into a batch

[transforms.batch_events]
type = "reduce"
inputs = ["wrap_event"]
expire_after_ms = 5000
max_events = 100

[transforms.batch_events.merge_strategies]
events = "array"

# Step 3: add envelope fields + compute HMAC

[transforms.build_envelope]
type = "remap"
inputs = ["batch_events"]
source = """
  secret = get_env_var!("HOST_AGENT_WEBHOOK_SECRET")
  envelope = {
    "batch_id": uuid_v4(),
    "hostname": get_hostname!(),
    "events": .events
  }
  body = encode_json(envelope)
  sig = downcase(encode_base16(hmac(body, secret, algorithm: "sha-256")))
  .x_signature = "sha256=" + sig
  .message = body
"""

# ── Sink: HTTP → Orion host-agent webhook ───────────────────────────────────
# Sends pre-built JSON body with HMAC signature header.

[sinks.webhook]
type = "http"
inputs = ["build_envelope"]
uri = "${ORION_HOST_AGENT_WEBHOOK_URL:-http://orion:3000/api/monitoring/security/webhooks/host-agent}"
method = "post"

[sinks.webhook.encoding]
codec = "raw_message"

[sinks.webhook.request.headers]
"X-Signature" = "{{ x_signature }}"
"Content-Type" = "application/json"

[sinks.webhook.request]
retry_attempts = 10
retry_initial_backoff_secs = 1

# Disable sink-level batching: the reduce transform already batches events
# into a signed envelope. If the sink batches multiple envelopes together the
# body becomes newline-delimited JSON but X-Signature only covers one, so the
# server's HMAC check always rejects with 401.
[sinks.webhook.batch]
max_events = 1

[sinks.webhook.healthcheck]
enabled = true
