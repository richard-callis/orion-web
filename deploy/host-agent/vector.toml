# Vector configuration for Orion host-agent telemetry shipper.
#
# Collects four signal categories from the Orion management host:
#   1. journald — SSH, sudo, PAM authentication failures
#   2. Docker socket — container lifecycle (OOM, stop, restart)
#   3. Vault audit — unseal, token creation, policy changes
#   4. Docker logs — Traefik access logs, Authentik auth events
#
# Batches events over 5s / 100 events, then POSTs JSON to the
# host-agent webhook on the Orion app server.
#
# Authentication:
#   The Vector shipper runs on the SAME host as Orion (localhost → localhost).
#   The webhook route's loopback fallback (isLoopbackWebhookRequest) accepts
#   these requests without HMAC — consistent with the dev-mode pattern already
#   used by crowdsec/wazuh routes when no secret is configured.
#
#   For cross-host scenarios, add `api_key` + `api_key_header` to the sink
#   and implement HMAC in a VRL remap step (PR3 follow-up).
#
# Secret management:
#   HOST_AGENT_WEBHOOK_SECRET is generated by bootstrap.sh (PR2).
#   It is written to .env and referenced by the vector service via env_file.

# ── Global settings ──────────────────────────────────────────────────────────

data_dir = "/var/lib/vector"
api:
  address = "127.0.0.1:8686"
  enabled = true

# ── Source 1: journald (auth events) ─────────────────────────────────────────
# Collects auth-related systemd journal entries.
# We use priority=debug to catch SSH/sudo/PAM failures (warn/error level).

[sources.journald_auth]
type = "journald"
journal_cursor_offset = "end"
_include_units = ["sshd.service", "sudo", "gdm-password", "login"]
priority = "debug"

# ── Source 2: Docker socket (container lifecycle events) ─────────────────────
# docker_logs source reads container logs AND emits lifecycle events
# (create, start, stop, kill, die, oom, restart) via the Docker Events API.

[sources.docker_events]
type = "docker_logs"
# Only care about lifecycle, not stdout — filtered in transform.

# ── Source 3: Vault audit log file ───────────────────────────────────────────
# Reads the file-based audit log written by Vault's audit device.
# File path: /vault/audit/audit.log (mounted via docker-compose volume share).

[sources.vault_audit]
type = "file"
include = ["/vault/audit/audit.log"]
read_from = "end"
data_dir = "/var/lib/vector"
polling_interval_secs = 5

# ── Source 4: Docker logs (edge containers: traefik + authentik) ─────────────
# Collects stdout/stderr from the edge-proxy containers.

[sources.docker_edge_logs]
type = "docker_logs"
containers.match = ["traefik", "authentik", "authentik-worker"]

# ── Transform 1: journald auth → structured event ───────────────────────────
# Maps journald log lines into the HostAgentEvent shape.
# The normalizer in the Orion route will apply severity rules by subtype.

[transforms.journald_filter]
type = "filter"
inputs = ["journald_auth"]
field = ".message"

[transforms.journald_filter.condition]
# Only forward lines that contain auth-relevant keywords.
# This avoids flooding the pipeline with routine journal entries.
type = "vrl"
source = '''
auth_keywords = ["Failed password", "Failed keyboard", "Invalid user", "authentication failure",
  "NOT in sudoers", "COMMAND", "Accepted password", "Accepted publickey",
  "pam_unix", "session opened", "session closed", "su[[:space:]]", "gdm-", "login[[:space:]]"]
result = any(auth_keywords | map(|kw| .contains(kw)))
'''

[transforms.journald_to_event]
type = "remap"
inputs = ["journald_filter"]

[transforms.journald_to_event.script]
# Extract message and classify into subtypes
msg = .message ?? ""
unit = ._SYSTEMD_UNIT ?? "journald"

# Classify into subtypes
if msg.contains("Failed password") || msg.contains("Failed keyboard") || msg.contains("invalid user") {
  .subtype = "ssh.failed_password"
} else if msg.contains("Invalid user") {
  .subtype = "ssh.invalid_user"
} else if msg.contains("Accepted password") || msg.contains("Accepted publickey") {
  .subtype = "auth.success"
} else if msg.contains("NOT in sudoers") {
  .subtype = "sudo.failed"
} else if msg.contains("sudo:") && msg.contains(": TTY") && !msg.contains("NOT in sudoers") {
  .subtype = "sudo.success"
} else {
  .subtype = "auth.generic"
}

.category = "auth"
.severity = to_int!(.priority) ?? 6
.timestamp = now()
.source_file = unit
.raw = msg

# ── Transform 2: Docker events → structured event ───────────────────────────
# Maps Docker container lifecycle events.

[transforms.docker_filter]
type = "filter"
inputs = ["docker_events"]
field = ".container_status"

[transforms.docker_filter.condition]
type = "vrl"
source = '''
allowed_statuses = ["oom_killed", "die", "restart", "create", "start"]
result = any(allowed_statuses | map(|s| . == .container_status))
'''

[transforms.docker_to_event]
type = "remap"
inputs = ["docker_filter"]

[transforms.docker_to_event.script]
status = .container_status ?? ""
name = .container_name ?? "unknown"

if status == "oom_killed" {
  .subtype = "container.oom"
} else if status == "die" {
  .subtype = "container.dead"
} else if status == "restart" {
  .subtype = "container.restarted"
} else {
  .subtype = "container." + status
}

.category = "docker"
.severity = (status == "oom_killed") ? 30 : 20
.timestamp = now()
.source_file = name
.raw = .message ?? ""
.hostname = .container_labels."com.orion.hostname" ?? "docker"

# ── Transform 3: Vault audit → structured event ─────────────────────────────
# Parses Vault's file audit JSON lines into the HostAgentEvent shape.

[transforms.vault_parse]
type = "parse_json"
inputs = ["vault_audit"]
field = ".message"

[transforms.vault_to_event]
type = "remap"
inputs = ["vault_parse"]
skip_parsers = false

[transforms.vault_to_event.script]
# Vault audit log format: {"time":"...","request":{"operation":"...","token":{"policies":["..."]}}}
request = .request ?? {}
operation = request.operation ?? "unknown"
path = request.path ?? ""

if operation == "update" && path.contains("unseal") {
  .subtype = "unseal"
} else if operation == "update" && path == "sys/token/create" {
  if (request.policies ?? []).contains("root") {
    .subtype = "token.create.root"
  } else {
    .subtype = "token.create"
  }
} else if operation == "revoke" {
  .subtype = "token.revoke"
} else if operation == "update" && path.contains("policy") {
  .subtype = "policy.change"
} else {
  .subtype = operation
}

.category = "vault"
.severity = (.subtype == "unseal") ? 50 : (.subtype.contains("root")) ? 70 : 30
.timestamp = .time ?? now()
.source_file = "/vault/audit/audit.log"
.raw = string!(.message ?? "")
.hostname = "vault"

# ── Transform 4: Edge Docker logs → structured event ────────────────────────
# Parses Authentik and Traefik log lines.

[transforms.docker_edge_filter]
type = "filter"
inputs = ["docker_edge_logs"]
field = ".container_status"

[transforms.docker_edge_filter.condition]
type = "vrl"
source = '''
# Only forward log lines (not lifecycle events — those go through docker_events)
result = .container_status == null || .container_status == ""
'''

[transforms.edge_to_event]
type = "remap"
inputs = ["docker_edge_filter"]

[transforms.edge_to_event.script]
name = .container_name ?? "edge"
msg = .message ?? ""

if name.contains("authentik") {
  if msg.contains("denied") || msg.contains("Forbidden") || msg.contains("invalid") {
    .subtype = "auth.denied"
  } else if msg.contains("Authenticated successfully") || msg.contains("login success") {
    .subtype = "auth.success"
  } else {
    .subtype = "auth.generic"
  }
  .category = "edge"
} else if name.contains("traefik") {
  if msg.contains("403") || msg.contains("401") || msg.contains("denied") {
    .subtype = "http.deny"
  } else {
    .subtype = "http.access"
  }
  .category = "edge"
} else {
  .category = "edge"
  .subtype = "http.access"
}

.severity = (.subtype == "auth.denied") ? 30 : (.subtype == "http.deny") ? 20 : 0
.timestamp = now()
.source_file = name
.raw = msg
.hostname = name

# ── Aggregation: merge all event sources into a single pipeline ──────────────
# This gives us a unified stream that the batch component can group.

[aggregators.event_batch]
type = "batch"
inputs = ["journald_to_event", "docker_to_event", "vault_to_event", "edge_to_event"]
size = 100
timeout_secs = 5

# ── Sink: HTTP → Orion host-agent webhook ───────────────────────────────────
# Sends batches as JSON POST to the Orion ingest endpoint.
#
# Since Vector runs on the same host as Orion (localhost), we rely on
# the webhook route's isLoopbackWebhookRequest check — no HMAC needed.
# For cross-host scenarios, add HMAC header in a follow-up.

[sinks.webhook]
type = "http"
inputs = ["aggregators_event_batch"]
uri = "${ORION_HOST_AGENT_WEBHOOK_URL:-http://orion:3000/api/monitoring/security/webhooks/host-agent}"
method = "post"

encoding.options = {
  timestamp_format = "rfc3339",
}

# Retry on failure
retry.max_retries = 10
retry.initial_backpressure_ms = 100

# Healthcheck
healthcheck.enabled = true
