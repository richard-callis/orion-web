apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: <ENV_NAME>
  namespace: argocd
spec:
  description: "ORION-managed cluster: <ENV_NAME>"
  sourceRepos:
    - '<GITEA_REPO_URL>'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  # Restrict cluster-scoped resources to only those ORION needs
  clusterResourceWhitelist:
    - group: ''
      kind: 'Namespace'
    - group: 'rbac.authorization.k8s.io'
      kind: 'ClusterRole'
    - group: 'rbac.authorization.k8s.io'
      kind: 'ClusterRoleBinding'
  # Restrict namespace-scoped resources to only those ORION needs
  namespaceResourceWhitelist:
    - group: ''
      kind: 'Pod'
    - group: ''
      kind: 'Service'
    - group: ''
      kind: 'ServiceAccount'
    - group: ''
      kind: 'ConfigMap'
    - group: ''
      kind: 'Secret'
    - group: ''
      kind: 'PersistentVolumeClaim'
    - group: ''
      kind: 'ResourceQuota'
    - group: ''
      kind: 'LimitRange'
    - group: 'apps'
      kind: 'Deployment'
    - group: 'apps'
      kind: 'StatefulSet'
    - group: 'apps'
      kind: 'DaemonSet'
    - group: 'apps'
      kind: 'ReplicaSet'
    - group: 'batch'
      kind: 'Job'
    - group: 'batch'
      kind: 'CronJob'
    - group: 'networking.k8s.io'
      kind: 'Ingress'
    - group: 'networking.k8s.io'
      kind: 'NetworkPolicy'
    - group: 'cert-manager.io'
      kind: 'Certificate'
    - group: 'argoproj.io'
      kind: 'Application'
    - group: 'argoproj.io'
      kind: 'ApplicationSet'
    - group: 'argoproj.io'
      kind: 'AppProject'
    - group: 'traefik.io'
      kind: 'IngressRoute'
    - group: 'traefik.io'
      kind: 'Middleware'
    - group: 'traefik.io'
      kind: 'ServerStrap'
    - group: 'traefik.io'
      kind: 'TLSOption'
    - group: 'traefik.io'
      kind: 'TraefikService'
